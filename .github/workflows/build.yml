name: Build snapview.exe

on:
  push:
    branches: [main, master, 'claude/**']
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable, MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build (release)
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Rename binary
        shell: pwsh
        run: |
          $src = "target/x86_64-pc-windows-msvc/release/snapview.exe"
          $dst = "snapview.exe"
          Copy-Item $src $dst -Force
          Get-Item $dst | Format-List Name, Length

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: snapview-windows
          path: snapview.exe
          retention-days: 30

      - name: Attach to GitHub Release (only on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: snapview.exe
          generate_release_notes: true
