name: Build snapview.exe

on:
  push:
    branches: [main, master, 'claude/**']
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable, MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build (release)
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Stage binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path target/release | Out-Null
          Copy-Item target/x86_64-pc-windows-msvc/release/snapview.exe target/release/snapview.exe -Force
          Copy-Item target/release/snapview.exe snapview.exe -Force

      # Optional code signing — set repo secrets WINDOWS_PFX_BASE64 and WINDOWS_PFX_PASSWORD to enable.
      - name: Decode signing certificate
        env:
          WINDOWS_PFX_BASE64: ${{ secrets.WINDOWS_PFX_BASE64 }}
        shell: pwsh
        run: |
          if ([string]::IsNullOrEmpty($env:WINDOWS_PFX_BASE64)) {
            Write-Host "No signing cert configured; skipping."
            exit 0
          }
          [IO.File]::WriteAllBytes("cert.pfx", [Convert]::FromBase64String($env:WINDOWS_PFX_BASE64))

      - name: Sign snapview.exe
        env:
          WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
        shell: pwsh
        run: |
          if (-not (Test-Path cert.pfx)) {
            Write-Host "No cert.pfx; skipping signing."
            exit 0
          }
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" | Sort-Object FullName -Descending | Select-Object -First 1).FullName
          & $signtool sign /f cert.pfx /p $env:WINDOWS_PFX_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 target/release/snapview.exe
          Copy-Item target/release/snapview.exe snapview.exe -Force

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        env:
          WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
        run: |
          # Derive the installer version from the pushed tag (v1.2.3 -> 1.2.3)
          # when this is a tag build, otherwise fall back to the literal
          # define inside the .iss file. Use a PowerShell array so the
          # empty case doesn't pass a bogus empty argument to ISCC.
          $extraArgs = @()
          if ($env:GITHUB_REF -like "refs/tags/v*") {
            $ver = $env:GITHUB_REF -replace "^refs/tags/v",""
            $extraArgs += "/DMyAppVersion=$ver"
          }
          if (Test-Path cert.pfx) {
            $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" | Sort-Object FullName -Descending | Select-Object -First 1).FullName
            $pfx = (Resolve-Path cert.pfx).Path
            $signCmd = "`"$signtool`" sign /f `"$pfx`" /p $env:WINDOWS_PFX_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 `$f"
            & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/Ssigntool=$signCmd" @extraArgs installer/snapview.iss
          } else {
            (Get-Content installer/snapview.iss) `
              -replace '^SignTool=signtool', '; SignTool=signtool' `
              -replace '^SignedUninstaller=yes', '; SignedUninstaller=yes' `
              | Set-Content installer/snapview.iss
            & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" @extraArgs installer/snapview.iss
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: snapview-windows
          path: |
            snapview.exe
            dist/snapview-setup-*.exe
          retention-days: 30

      - name: Attach to GitHub Release (only on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            snapview.exe
            dist/snapview-setup-*.exe
          generate_release_notes: true
